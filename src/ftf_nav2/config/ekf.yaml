ekf_filter_node:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 0.8
    two_d_mode: true
    publish_tf: true

    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # ODOM (SPS)
    odom0: /odom_raw
    odom0_config: [false, false, false, # Keine absolute X,Y Position
               false, false, false, # Keine absolute Orientierung
               true,  false, false, # NUR vx (Geschwindigkeit vorwärts)
               false, false, true,  # NUR v_yaw (Drehgeschwindigkeit)
               false, false, false]
    odom0_differential: false
    odom0_relative: false

    # IMU (nur Gyro Z)
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true