amcl:
  ros__parameters:
    use_sim_time: false
    # Alpha-Werte nach Ferguson (optimiert für reale Motoren/Räder)
    alpha1: 0.25
    alpha2: 0.20
    alpha3: 0.15
    alpha4: 0.20
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "/scan"
    min_particles: 500
    max_particles: 2000
    set_initial_pose: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    # Standard-Verhaltensbaum
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      movement_time_allowance: 30.0  # Mehr Zeit für enge Stellen
      required_movement_radius: 0.05

    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15
      stateful: true

    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15   # Langsamer = Präziser
      max_vel_x: 0.18
      max_vel_theta: 0.20        # Langsame Drehung verhindert Wand-Treffer
      use_rotate_to_heading: true
      allow_reversing: false
      # Lookahead: Kleinerer Wert zwingt ihn, exakt auf der Linie zu bleiben
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.4
      lookahead_time: 1.5
      use_cost_constrained_velocity_scaling: false # Wichtig, um in Türen nicht zu stoppen

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Dein Beispiel-Wert für die physikalische Größe:
      robot_radius: 0.275
      footprint_padding: 0.025
      
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan  # Prüfe ob dein Topic /scan oder /base_scan heißt!
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 10.0 sorgt für eine schmale, scharfe Farbkante (weniger "dickes" Blau)
        cost_scaling_factor: 10.0
        # 0.40 sorgt dafür, dass die lila Zone nicht den Flur blockiert
        inflation_radius: 0.40
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      robot_radius: 0.3
      footprint: "[ [0.40, 0.28], [0.40, -0.28], [-0.40, -0.28], [-0.40, 0.28] ]"

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 7.0
        inflation_radius: 0.45

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true

behavior_server:
  ros__parameters:
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"