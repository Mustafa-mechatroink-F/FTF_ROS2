amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: /scan/filtered
    tf_broadcast: true
    transform_tolerance: 1.0
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    min_particles: 800
    max_particles: 2500
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    laser_model_type: "likelihood_field"
    laser_max_range: 29.5
    laser_min_range: 0.05
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    update_min_a: 0.20
    update_min_d: 0.10
    z_hit: 0.7
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.2
    sigma_hit: 0.2
    lambda_short: 0.1
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: false
    save_pose_rate: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "navigate_to_pose_w_replanning_and_recovery.xml"
    nav_through_poses_bt_xml: "navigate_to_pose_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    publish_zero_velocity: true
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.12
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.08
      yaw_goal_tolerance: 0.10
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.40
      max_vel_y: 0.0
      max_vel_theta: 0.35
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.08
      acc_lim_x: 0.6
      acc_lim_y: 0.0
      acc_lim_theta: 1.3
      decel_lim_x: -0.25
      decel_lim_y: 0.0
      decel_lim_theta: -0.6
      vx_samples: 15
      vy_samples: 1
      vtheta_samples: 24
      sim_time: 1.8
      linear_granularity: 0.05
      angular_granularity: 0.04
      xy_goal_tolerance: 0.08
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 25.0
      PathAlign.scale: 6.0
      GoalAlign.scale: 5.0
      PathAlign.forward_point_distance: 0.35
      GoalAlign.forward_point_distance: 0.35
      PathDist.scale: 16.0
      GoalDist.scale: 12.0
      RotateToGoal.scale: 25.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 12.0
      publish_frequency: 6.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      transform_tolerance: 0.3
      footprint: "[ [0.415, 0.35], [0.415, -0.35], [-0.415, -0.35], [-0.415, 0.35] ]"
      footprint_padding: 0.02
      plugins: ["obstacle_layer", "inflation_layer"]
      always_send_full_costmap: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan/filtered
          data_type: "LaserScan"
          clearing: true
          marking: true
          inf_is_valid: true
          observation_persistence: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.05
          raytrace_max_range: 3.2
          raytrace_min_range: 0.05
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      transform_tolerance: 0.3
      track_unknown_space: true
      footprint: "[ [0.415, 0.35], [0.415, -0.35], [-0.415, -0.35], [-0.415, 0.35] ]"
      footprint_padding: 0.03
      plugins: ["static_layer", "inflation_layer"]
      always_send_full_costmap: true
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.40

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.2
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.2
    rotational_acc_lim: 0.8

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/ftf2/fh_ws/src/ftf_nav2/maps/CIMTT_komplett1.yaml"

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

lifecycle_manager_service:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 0.0
    node_names: ['map_server', 'amcl', 'controller_server', 'planner_server', 'behavior_server', 'bt_navigator']

dock_laden_node:
  ros__parameters:
    transfer_height_mm: 480.0
    height_tolerance_mm: 5.0
    prepare_timeout_s: 30.0
    load_timeout_s: 12.0
    use_nav2_staging: true
    nav_goal_timeout_s: 180.0
    staging_frame: "map"
    staging_x: -0.801
    staging_y: -1.322
    staging_yaw_deg: -99.6
    target_dist_m: 0.0
    dock_tolerance_m: 0.02
    max_linear_speed: 0.05
    slow_linear_speed: 0.025
    angular_gain: 1.20
    linear_gain: 0.30
    dock_result_timeout_s: 120.0
    left_sector_min_deg: -30.0
    left_sector_max_deg: -8.0
    right_sector_min_deg: 8.0
    right_sector_max_deg: 30.0
    center_sector_min_deg: -6.0
    center_sector_max_deg: 6.0
    final_stop_dist_m: 0.05
    apex_align_tolerance: 0.04
    side_align_tolerance: 0.03
    reverse_undock_speed: -0.20
    reverse_undock_time_s: 6.0
    scan_topic: "/scan/filtered"
    cmd_vel_docking_topic: "/cmd_vel_docking"
    hub_target_topic: "/ftf/hub/target_height"
    hub_height_topic: "/ftf/hub/height"
    hub_ready_topic: "/ftf/hub/ready"
    conveyor_cmd_topic: "/ftf/conveyor/cmd"
    mission_start_topic: "/ftf/start_load"
    mission_busy_topic: "/ftf/mission/busy"
    mission_state_topic: "/ftf/mission/state"
    vertex_debug_topic: "/v_vertex_ue"

unload_wait_node:
  ros__parameters:
    use_nav2_to_unload: true
    nav_goal_timeout_s: 180.0
    unload_frame: "map"
    unload_x: -17.633
    unload_y: 2.706
    unload_yaw_deg: 81.318
    unload_height_mm: 700.0
    lower_height_mm: 420.0
    hub_height_tolerance_mm: 10.0
    hub_raise_timeout_s: 30.0
    hub_lower_timeout_s: 30.0
    wait_for_manual_release: true
    start_unload_topic: "/ftf/start_unload"
    continue_topic: "/ftf/continue_after_unload"
    mission_busy_topic: "/ftf/mission/busy"
    mission_state_topic: "/ftf/mission/state"
    hub_target_topic: "/ftf/hub/target_height"
    hub_height_topic: "/ftf/hub/height"
    hub_ready_topic: "/ftf/hub/ready"

unload_return_node:
  ros__parameters:
    use_nav2: true
    nav_goal_timeout_s: 180.0
    start_unload_topic: "/ftf/start_unload"
    auto_restart_load_cycle: true
    restart_delay_s: 1.0
    start_load_topic: "/ftf/start_mission"
    unload_frame: "map"
    unload_x: -17.633
    unload_y: 2.706
    unload_yaw_deg: 81.318
    load_frame: "map"
    load_x: -0.801
    load_y: -1.322
    load_yaw_deg: -99.6
    unload_height_mm: 700.0
    hub_height_tolerance_mm: 15.0
    hub_raise_timeout_s: 40.0
    reset_wait_min_s: 2.0
    ready_wait_timeout_s: 40.0
    ready_height_max_mm: 450.0
    sensor2_must_be_true_before_waiting_false: true
    sensor_false_debounce_s: 1.0
    sensor2_present_timeout_s: 30.0
    sensor2_removed_timeout_s: 600.0
    mission_busy_topic: "/ftf/mission/busy"
    mission_state_topic: "/ftf/mission/state"
    hub_target_topic: "/ftf/hub/target_height"
    hub_height_topic: "/ftf/hub/height"
    hub_ready_topic: "/ftf/hub/ready"
    conveyor_cmd_topic: "/ftf/conveyor/cmd"
    sensor2_topic: "/ftf/lam/sensor2"